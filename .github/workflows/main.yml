name: Discord Commit Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send commits to Discord
        run: |
          msg=""

          while IFS= read -r -d '' entry; do
            ts="${entry%%$'\n'*}"
            msgtxt="${entry#*$'\n'}"
            formatted=$(TZ="Europe/Paris" date -d "$ts" "+%d/%m/%Y %H:%M")
            msg="${msg}- \`${formatted}\` — ${msgtxt}"$'\n'
          done < <(
            jq -r '.commits[] | "\(.timestamp)\n\(.message)\u0000"' "$GITHUB_EVENT_PATH"
          )

          jq -n --arg description "$msg" '{
            embeds: [{
              title: "Nouveaux commits poussés :",
              description: $description,
              color: 5814783
            }]
          }' > payload.json

          curl -fsSL -H "Content-Type: application/json" \
               -X POST \
               -d @payload.json \
               "${{ secrets.DISCORD_WEBHOOK }}"

name: Discord Commit Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send commits to Discord
        run: |
          msg="**Nouveaux commits poussés sur \`${GITHUB_REF_NAME}\` :**"$'\n\n'

          while read -r line; do
            msg="$msg$line"$'\n'
          done < <(jq -r --argfile event "$GITHUB_EVENT_PATH" '.commits[] | "- `\(.id[0:7])` — \(.message | gsub("\n"; " ")) (⏱️ \(.timestamp))"' "$GITHUB_EVENT_PATH" | while read -r line; do ts=$(echo "$line" | sed -n 's/.*(⏱️ \(.*\)).*/\1/p') formatted=$(date -d "$ts" "+%d/%m/%Y %H:%M") echo "${line/($ts)/(⏱️ $formatted)}" done )

          jq -n --arg content "$msg" '{content: $content}' > payload.json

          curl -H "Content-Type: application/json" \
               -X POST \
               -d @payload.json \
               "${{ secrets.DISCORD_WEBHOOK }}"

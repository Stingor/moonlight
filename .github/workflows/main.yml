name: Discord Commit Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Format commit list
        id: commits
        run: |
          commits=$(jq -r '.commits[] | "- `\(.id[0:7])` — \(.message | gsub("\n"; " "))"' $GITHUB_EVENT_PATH | tr '\n' '\n')
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$commits" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send to Discord
        run: |
          payload=$(jq -n '{content: ("**Nouveaux commits poussés sur \`${{ github.ref_name }}\` :**\n\n${{ steps.commits.outputs.list }}")}')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$payload" \
               ${{ secrets.DISCORD_WEBHOOK }}

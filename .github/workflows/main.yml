name: Discord Commit Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send commits to Discord
        run: |
          msg="Nouveaux commits poussés :\n\n"

          while read -r ts msgtxt; do
            formatted=$(TZ="Europe/Paris" date -d "$ts" "+%d/%m/%Y %H:%M")
            msg="${msg}• \`${formatted}\` — ${msgtxt}\n"
          done < <(
            jq -r '.commits[] | "\(.timestamp) \(.message)"' "$GITHUB_EVENT_PATH"
          )

          printf '%s\n' "--- MESSAGE ENVOYÉ ---"
          printf '%s\n' "$msg"
          printf '%s\n' "-----------------------"

          # ENCODAGE JSON CORRECT (la clé du problème)
          payload=$(printf '%s' "$msg" | jq -R -s '{content: .}')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$payload" \
               "${{ secrets.DISCORD_WEBHOOK }}"

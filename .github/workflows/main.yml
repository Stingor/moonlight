name: Discord Commit Notification

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send commit message to Discord
        env:
          WEBHOOK_URL: https://discord.com/api/webhooks/1477596222486347931/_45AGmvGhumiz3X8QyIb6ZwvC4HKlRc4V5zgmeCUD6s8gWTa9_wr-G8-eg99K_FeVhpb
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"

          # Construction du message Discord
          JSON=$(jq -n \
            --arg msg "$COMMIT_MSG" \
            --arg author "$COMMIT_AUTHOR" \
            '{content: ("**Commit de " + $author + "**\n" + $msg + "\n\n")}')

          # Envoi
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$JSON" \
               "$WEBHOOK_URL"

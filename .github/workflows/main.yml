name: Discord Commit Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send commits to Discord
        run: |
          msg="**Nouveaux commits poussés sur \`${GITHUB_REF_NAME}\` :**"$'\n\n'
          
          while read -r ts msgtxt; do
            formatted=$(TZ="Europe/Paris" date -d "$ts" "+%d/%m/%Y %H:%M")
            msg="$msg- \`$formatted\` — $msgtxt"$'\n'
          done < <(
            jq -r '.commits[] | "\(.timestamp) \(.message | gsub("\n"; " "))"' "$GITHUB_EVENT_PATH"
          )
          
          jq -n --arg description "$msg" \
          '{
            embeds: [
              {
                title: "Nouveaux commits poussés",
                description: $description,
                color: 5814783
              }
            ]
          }' > payload.json


          curl -H "Content-Type: application/json" \
               -X POST \
               -d @payload.json \
               "${{ secrets.DISCORD_WEBHOOK }}"

name: Discord Commit Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send commits to Discord
        run: |
          msg=""
          
          while read -r ts msgtxt; do
            formatted=$(TZ="Europe/Paris" date -d "$ts" "+%d/%m/%Y %H:%M")
          
            fields="${fields}{
              \"name\": \"\`${formatted}\`\",
              \"value\": \"${msgtxt}\",
              \"inline\": false
            },"
          done < <(
            jq -r '.commits[] | "\(.timestamp) \(.message | gsub("\n"; " "))"' "$GITHUB_EVENT_PATH"
          )
          
          jq -n --argjson fields "[${fields%?}]" \
          '{
            embeds: [
              {
                title: "Nouveaux commits poussés :",
                fields: $fields,
                color: 5814783
              }
            ]
          }' > payload.json


          curl -H "Content-Type: application/json" \
               -X POST \
               -d @payload.json \
               "${{ secrets.DISCORD_WEBHOOK }}"

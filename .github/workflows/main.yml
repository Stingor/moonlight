name: Discord Commit Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send commits to Discord
        run: |
          msg="**Nouveaux commits poussés sur \`${GITHUB_REF_NAME}\` :**"$'\n\n'

          while read -r line; do
            msg="$msg$line"$'\n'
          done < <(jq -r '.commits[] | "- `\(.timestamp | fromdate | strftime("%d/%m/%Y")) - \(.id[0:7])` — \(.message | gsub("\n"; " ")"' "$GITHUB_EVENT_PATH")

          jq -n --arg content "$msg" '{content: $content}' > payload.json

          curl -H "Content-Type: application/json" \
               -X POST \
               -d @payload.json \
               "${{ secrets.DISCORD_WEBHOOK }}"

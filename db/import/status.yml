      bonus2 bMagicAddRace2,RC2_BIO5_ACOLYTE_MERCHANT, .@val1;
      bonus2 bSubRace2,RC2_BIO5_MAGE_ARCHER, .@val2;
  - Status: Lhz_Dun_N3
    Icon: EFST_LHZ_DUN_N3

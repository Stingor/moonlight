      bonus2 bMagicAddRace2,RC2_BIO5_MAGE_ARCHER, .@val1;
      bonus2 bSubRace2,RC2_BIO5_SWORDMAN_THIEF, .@val2;
  - Status: Lhz_Dun_N4
    Icon: EFST_LHZ_DUN_N4
    Flags:
      NoClearbuff: true

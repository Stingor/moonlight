    Script: |
      bonus2 bAddClass,Class_All,2;
      .@a = getequiprefinerycnt(EQI_GARMENT);
      .@b = getequiprefinerycnt(EQI_SHOES);
      .@c = getequiprefinerycnt(EQI_ARMOR);
      if (.@a >= 7 && .@b >= 7 && .@c >= 7) {
         bonus2 bAddClass,Class_All,3;

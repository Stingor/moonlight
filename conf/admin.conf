//--------------------------------------------------------------
// Map-server administration channel configuration
//--------------------------------------------------------------
// Dedicated TCP channel (see src/map/admin.cpp) that lets an external
// admin tool trigger reloads and run atcommands over a simple text
// protocol, without emulating a Ragnarok client.
//
// SECURITY: this is an administrative back door. Change admin_secret
// below and keep admin_port firewalled to trusted hosts.
//--------------------------------------------------------------

// Enable the admin channel? (yes/no)
admin_enable: yes

// IP to bind the listener to.
//   0.0.0.0 = all interfaces (reachable on the LAN)
//   127.0.0.1 = localhost only (recommended; use an SSH tunnel for remote)
admin_bind_ip: 0.0.0.0

// TCP port the admin channel listens on.
admin_port: 7799

// Shared secret required by the AUTH command before any other command.
// CHANGE THIS.
//
// If admin_secret_md5 is "no" (default), this is the plaintext password and
// the client sends it as-is.
//
// If admin_secret_md5 is "yes", this is the MD5 HASH of your password (32 hex
// chars). The client still sends the real password; the server hashes it and
// compares. This keeps the plaintext out of the config file.
// Generate a hash with:
//   python -c "import hashlib;print(hashlib.md5(b'YOUR-PASSWORD').hexdigest())"
admin_secret: CHANGE-ME-please

// Treat admin_secret as an MD5 hash instead of plaintext? (yes/no)
admin_secret_md5: no

// Local overrides (not tracked) go here.
import: conf/import/admin_conf.txt
